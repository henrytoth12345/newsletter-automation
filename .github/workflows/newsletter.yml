name: Daily Newsletter

on:
  schedule:
    - cron: '0 12 * * *'  # 7am CDT (UTC-5)
  workflow_dispatch:       # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_RECIPIENT: ${{ secrets.NEWSLETTER_RECIPIENT }}
        run: python run_newsletter.py --from-queue --skip-images

      - name: Save updated topics.txt
        run: |
          git config user.name "Newsletter Bot"
          git config user.email "action@github.com"
          git add topics.txt
          git diff --staged --quiet || git commit -m "Mark topic as sent [skip ci]"
          git push
