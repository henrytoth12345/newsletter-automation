name: Daily Learn Newsletter

on:
  workflow_dispatch:       # triggered by cron-job.org or manually from GitHub UI

permissions:
  contents: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run learn newsletter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python run_newsletter.py \
            --from-queue \
            --queue topics_learn.txt \
            --recipient ${{ secrets.NEWSLETTER_RECIPIENT_LEARN }} \
            --renderer tools/render_learn.py \
            --skip-images

      - name: Save updated topics_learn.txt
        run: |
          git config user.name "Newsletter Bot"
          git config user.email "action@github.com"
          git add topics_learn.txt
          git diff --staged --quiet || git commit -m "Mark learn topic as sent [skip ci]"
          git push
